<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イベント作成 - Event Board</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <a href="/">🎉 Event Board</a>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link">ホーム</a>
                <a href="#" class="nav-link" onclick="logout(event)">ログアウト</a>
            </div>
            <div class="user-info" id="userInfo">
                <span id="username"></span>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="create-event-section">
            <h1>新しいイベントを作成</h1>
            
            <form id="createEventForm" onsubmit="handleCreateEvent(event)" class="event-form">
                <div class="form-group">
                    <label for="title">イベント名 *</label>
                    <input 
                        type="text" 
                        id="title" 
                        name="title" 
                        required
                        placeholder="イベント名を入力"
                    >
                </div>

                <div class="form-group">
                    <label for="description">説明 *</label>
                    <textarea 
                        id="description" 
                        name="description" 
                        required
                        placeholder="イベントの説明を入力"
                        rows="5"
                    ></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="location">場所 *</label>
                        <input 
                            type="text" 
                            id="location" 
                            name="location" 
                            required
                            placeholder="開催場所を入力"
                        >
                    </div>

                    <div class="form-group">
                        <label for="eventDate">日時 *</label>
                        <input 
                            type="datetime-local" 
                            id="eventDate" 
                            name="eventDate" 
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="maxParticipants">最大参加人数（空欄で無制限）</label>
                    <input 
                        type="number" 
                        id="maxParticipants" 
                        name="maxParticipants" 
                        min="1"
                        placeholder="最大参加人数"
                    >
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">イベントを作成</button>
                    <a href="/" class="btn btn-secondary">キャンセル</a>
                </div>
            </form>

            <div id="successMessage" class="success-message" style="display:none;">
                イベントを作成しました！ <a href="/">ホームに戻る</a>
            </div>
            <div id="errorMessage" class="error-message" style="display:none;"></div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/create_event.js') }}"></script>
</body>
</html>
